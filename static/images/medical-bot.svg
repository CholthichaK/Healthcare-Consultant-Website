<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="botGradient" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#89CFF0"></stop>
      <stop offset="50%" stop-color="#FFB6C1"></stop>
      <stop offset="100%" stop-color="#FFF5BA"></stop>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15"></feDropShadow>
    </filter>
  </defs>

  <!-- Head -->
  <rect x="45" y="35" width="110" height="90" rx="30" fill="url(#botGradient)" filter="url(#shadow)"></rect>

  <!-- Eyes -->
  <circle cx="80" cy="80" r="8" fill="#1F2937"></circle>
  <circle cx="120" cy="80" r="8" fill="#1F2937"></circle>

  <!-- Smile -->
  <path d="M80 100 Q100 115 120 100" stroke="#1F2937" stroke-width="5" stroke-linecap="round"></path>

  <!-- Antenna -->
  <line x1="100" y1="35" x2="100" y2="15" stroke="#89CFF0" stroke-width="6" stroke-linecap="round"></line>

  <circle cx="100" cy="10" r="8" fill="#89CFF0"></circle>

  <!-- Body -->
  <rect x="60" y="130" width="80" height="45" rx="20" fill="url(#botGradient)"></rect>

  <!-- Medical Cross -->
  <rect x="92" y="140" width="16" height="25" rx="3" fill="white"></rect>
  <rect x="87" y="145" width="26" height="15" rx="3" fill="white"></rect>

</svg>